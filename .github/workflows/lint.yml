# Run the linting suite for the pyroma package
# Based on https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Lint package

on: [push, pull_request, workflow_dispatch]

env:
  FORCE_COLOR: 1

permissions:
  contents: read

jobs:
  build:
    name: Run pre-commit

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  typecheck:
    name: Run ty and pyrefly

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - name: Run ty
        run: uv run --extra test --group typecheck ty check
      - name: Run pyrefly
        run: uv run --extra test --group typecheck pyrefly check

  selfcheck:
    name: Run pyroma on itself

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - name: Run pyroma
        run: uv run --no-default-groups --extra test pyroma --min 10 .

  selfcheck-strict:
    name: Run pyroma on itself, scoring advisory checks

    runs-on: ubuntu-latest
    # Advisory checks are not a merge gate. This job surfaces what pyroma
    # would say about itself under --strict; promote it to blocking once
    # the remaining findings are addressed.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - name: Run pyroma with advisory checks scored
        run: uv run --no-default-groups --extra test pyroma --strict --min 10 .

  complexity:
    name: Run Lizard

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - name: Check cyclomatic complexity
        run: uv run --only-group quality lizard pyroma --exclude "pyroma/testdata/*" --warnings_only

  dependencies:
    name: Run deptry and Semgrep

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - name: Check dependencies
        run: uv run --no-default-groups --group quality deptry . --github-output
      - name: Check sensitive exception data
        run: uv run --only-group quality semgrep scan --config .semgrep.yml --error pyroma
