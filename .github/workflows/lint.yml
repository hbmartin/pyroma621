# Run the linting suite for the pyroma package
# Based on https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Lint package

on: [push, pull_request, workflow_dispatch]

env:
  FORCE_COLOR: 1

jobs:
  build:
    name: Run pre-commit

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  typecheck:
    name: Run ty and pyrefly

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Run ty
        run: uv run --extra test --group typecheck ty check
      - name: Run pyrefly
        run: uv run --extra test --group typecheck pyrefly check
