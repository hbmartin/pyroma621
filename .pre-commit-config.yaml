repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Ruff runs through uv so the pinned version in pyproject.toml's
  # [dependency-groups] is the single source of truth, shared with CI.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --only-group lint ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run --only-group lint ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

  - repo: https://github.com/regebro/pyroma
    rev: '5.0b2'
    hooks:
      - id: pyroma

  - repo: https://github.com/tox-dev/tox-ini-fmt
    rev: 1.4.1
    hooks:
      - id: tox-ini-fmt

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
