[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 120
extend-exclude = ["pyroma/testdata"]

[tool.ruff.lint]
select = [
    "B",   # flake8-bugbear
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "W",   # pycodestyle warnings
]
ignore = [
    "B904", # raise-without-from-inside-except; the bare messages are intentional user-facing errors
]

[tool.coverage.run]
source = ["pyroma"]
omit = ["pyroma/tests.py", "pyroma/testdata/*"]

[tool.coverage.report]
show_missing = true
fail_under = 78

[tool.mypy]
python_version = "3.10"
packages = ["pyroma"]
exclude = ["testdata"]
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = [
    "build.*",
    "check_manifest",
    "distutils.*",
    "docutils.*",
    "setuptools.*",
    "trove_classifiers",
    "zest.releaser.*",
]
ignore_missing_imports = true
